<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Connect the Letters</title>
  <meta name="description" content="Learn the 28 letters of the Arabic alphabet — including their connected forms — in seven days." />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0E4D40" />

  <!-- iOS PWA: enables standalone mode, no Safari chrome -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Letters" />

  <!-- Icons -->
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Amiri:wght@400;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Built styles -->
  <link rel="stylesheet" href="./styles.css" />

  <style>
    html, body { background: #FAF4E6; margin: 0; }
    body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
    .arabic { font-family: 'Amiri', 'Scheherazade New', 'Geeza Pro', 'Traditional Arabic', serif; direction: rtl; }
    .ui-font { font-family: 'Outfit', system-ui, -apple-system, sans-serif; }
    .display-font { font-family: 'Cormorant Garamond', Georgia, serif; }
    .paper-grain {
      background-color: #FAF4E6;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(184,144,42,0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(14,77,64,0.03) 0%, transparent 50%);
    }
    .ornament::before, .ornament::after {
      content: '◆'; opacity: 0.4; font-size: 0.6em; margin: 0 0.6em; color: #B8902A;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    /* Loading state */
    #root:empty::before {
      content: ''; display: block; height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="./app.js" defer></script>
</body>
</html>
